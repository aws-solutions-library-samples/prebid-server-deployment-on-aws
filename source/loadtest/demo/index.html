<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prebid Server on AWS Demo</title>
    <style>
        #banner_imp_1, #banner_imp_2 {
            width: 300px;
            height: 250px;
            margin: 20px auto;
            border: 2px dashed #ccc;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #fafafa;
        }
    </style>
    <!-- Video.js from CDN -->
    <link href="https://cdn.jsdelivr.net/npm/video.js@7.21.5/dist/video-js.min.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/video.js@7.21.5/dist/video.min.js"></script>
    <!-- Video.js VAST/VPAID plugin from CDNJS -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/videojs-vast-vpaid/2.0.2/videojs.vast.vpaid.min.css" rel="stylesheet" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/videojs-vast-vpaid/2.0.2/videojs_5.vast.vpaid.min.js"></script>
    <!-- Prebid.js - local file (due to custom build) -->
    <script src="prebid9.38.0.js"></script>
    <script src="app.js"></script>
</head>
<body>
    <h1>Prebid Server on AWS Demo</h1>
    <div class="demo-content">
        <p>Welcome to the Prebid Server on AWS header bidding demonstration.</p>
        <p>This is a simple demo page showcasing the prebid.js -> prebid-server -> bidding-simulator integration.</p>
    </div>

    <div style="display: flex; gap: 40px; justify-content: center; margin-top: 40px;">
        <div>
            <h2>Display Ads</h2>
            <div id="banner_imp_1"></div>
            <div id="banner_imp_2"></div>
        </div>
        
        <div>
            <h2>Outstream Video Ads</h2>
            <div id="outstream_video_imp_1"></div>
        </div>
        
        <div>
            <h2>Instream Video Ads</h2>
            <video id="vid1" class="video-js vjs-default-skin vjs-big-play-centered" controls width="640" height="480">
            </video>
        </div>
    </div>
</body>
</html>
